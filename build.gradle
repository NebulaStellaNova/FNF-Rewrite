/*
 * Root build script generated by the FlixelGDX project generator.
 * - Java 17+ (FlixelGDX requires 17 at minimum).
 * - Pulls the framework from Maven Central (no local install needed).
 * - Kotlin plugin versions live in pluginManagement {} in settings.gradle.
 */
allprojects {
  version = "0.0.1"
  group = "com.nebulastellanova.rewrite"
  repositories {
    mavenCentral()
    google()
  }
}

buildscript {
    repositories {
        mavenCentral()
        maven { url 'https://s01.oss.sonatype.org' }
        gradlePluginPortal()
        mavenLocal()
        google()
        maven { url 'https://oss.sonatype.org/content/repositories/snapshots/' }
        maven { url 'https://s01.oss.sonatype.org/content/repositories/snapshots/' }
    }
    dependencies {
        classpath 'com.diffplug.spotless:spotless-plugin-gradle:8.6.0'
    }
}

apply from: 'gradle/spotless.gradle'
