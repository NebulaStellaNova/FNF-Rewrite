name: Build Desktop Bundles

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: {}

jobs:
  package-linux:
    name: Package Linux x64 bundle
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew :lwjgl3:jar --stacktrace

      - name: Package Linux x64 bundle
        run: ./gradlew :lwjgl3:packageLinuxX64 --stacktrace

      - name: Extract bundle for upload
        run: |
          mkdir -p unpacked
          unzip dist/fnf-rewrite-koltin-linuxX64.zip -d unpacked

      - name: Move the jar file
        run: |
          perl -pi -e 's|"classPath":\["fnf-rewrite-koltin|"classPath":\["app/fnf-rewrite-koltin|g' ./unpacked/app/fnf-rewrite-koltin.json
          mv ./unpacked/fnf-rewrite-koltin*.jar ./unpacked/app/

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: fnf-rewrite-linux
          path: unpacked/
          if-no-files-found: warn

  package-macos:
    name: Package macOS (Apple Silicon) bundle
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew :lwjgl3:jar --stacktrace

      - name: Package macOS Aarch64 bundle
        run: ./gradlew :lwjgl3:packageMacOsAarch64 --stacktrace

      - name: Extract bundle for upload
        run: |
          mkdir -p unpacked
          unzip dist/fnf-rewrite-koltin-macOsAarch64.zip -d unpacked

      - name: Move the jar file
        run: |
          perl -pi -e 's|"classPath":\["fnf-rewrite-koltin|"classPath":\["app/fnf-rewrite-koltin|g' ./unpacked/app/fnf-rewrite-koltin.json
          mv ./unpacked/fnf-rewrite-koltin*.jar ./unpacked/app/

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: fnf-rewrite-macos
          path: unpacked/
          if-no-files-found: warn

  package-windows:
    name: Package Windows x64 bundle
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew :lwjgl3:jar --stacktrace

      - name: Package Windows x64 bundle
        run: ./gradlew :lwjgl3:packageWinX64 --stacktrace

      - name: Extract bundle for upload
        run: |
          mkdir -p unpacked
          unzip dist/fnf-rewrite-koltin-winX64.zip -d unpacked

      - name: Move the jar file
        run: |
          perl -pi -e 's|"classPath":\["fnf-rewrite-koltin|"classPath":\["app/fnf-rewrite-koltin|g' ./unpacked/app/fnf-rewrite-koltin.json
          mv ./unpacked/fnf-rewrite-koltin*.jar ./unpacked/app/

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: fnf-rewrite-windows
          path: unpacked/
          if-no-files-found: warn