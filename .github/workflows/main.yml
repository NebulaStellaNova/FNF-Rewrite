name: Build Desktop Bundles

# Place this file at .github/workflows/main.yml (or similar) in your repo.

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: {}

jobs:
  package-linux:
    name: Package Linux x64 bundle
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew :lwjgl3:jar --stacktrace

      - name: Package Linux x64 bundle
        run: ./gradlew :lwjgl3:packageLinuxX64 --stacktrace

      - name: Rename bundle
        run: cp dist/fnf-rewrite-koltin-linuxX64.zip dist/fnf-rewrite-linux.zip

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: fnf-rewrite-linux
          path: dist/fnf-rewrite-linux.zip
          if-no-files-found: warn

  package-macos:
    name: Package macOS (Apple Silicon) bundle
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew :lwjgl3:jar --stacktrace

      - name: Package macOS Aarch64 bundle
        run: ./gradlew :lwjgl3:packageMacOsAarch64 --stacktrace

      - name: Rename bundle
        run: cp dist/fnf-rewrite-koltin-macOsAarch64.zip dist/fnf-rewrite-macos.zip

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: fnf-rewrite-macos
          path: dist/fnf-rewrite-macos.zip
          if-no-files-found: warn

  package-windows:
    name: Package Windows x64 bundle
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew :lwjgl3:jar --stacktrace

      - name: Package Windows x64 bundle
        run: ./gradlew :lwjgl3:packageWinX64 --stacktrace

      - name: Rename bundle
        run: cp dist/fnf-rewrite-koltin-winX64.zip dist/fnf-rewrite-windows.zip

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: fnf-rewrite-windows
          path: dist/fnf-rewrite-windows.zip
          if-no-files-found: warn