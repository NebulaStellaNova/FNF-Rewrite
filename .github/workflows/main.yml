name: Build Desktop Bundles

# Place this file at .github/workflows/main.yml (or similar) in your repo.

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: {}

jobs:
  package-linux:
    name: Package Linux x64 bundle
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew :lwjgl3:jar --stacktrace

      - name: Package Linux x64 bundle
        run: ./gradlew :lwjgl3:packageLinuxX64 --stacktrace

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-bundle
          path: dist/*linux*x64*
          if-no-files-found: warn

  package-macos:
    name: Package macOS (Apple Silicon) bundle
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew :lwjgl3:jar --stacktrace

      - name: Package macOS Aarch64 bundle
        run: ./gradlew :lwjgl3:packageMacOsAarch64 --stacktrace

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64-bundle
          path: dist/*mac*aarch64*
          if-no-files-found: warn

  package-windows:
    name: Package Windows x64 bundle
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew :lwjgl3:jar --stacktrace

      - name: Package Windows x64 bundle
        run: ./gradlew :lwjgl3:packageWinX64 --stacktrace

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-bundle
          path: dist/*win*x64*
          if-no-files-found: warn